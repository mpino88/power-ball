# Render Blueprint - despliegue gratis del bot
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: power-ball-bot
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: BOT_OWNER_ID
        sync: false
      - key: GOOGLE_SHEET_ID
        value: 12zXYV7G9Pg3n3_Fu-pMG67z6xGUlSbuY-Yfa94bzrI8
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      # O en lugar de JSON: GOOGLE_SERVICE_ACCOUNT_EMAIL + GOOGLE_PRIVATE_KEY
